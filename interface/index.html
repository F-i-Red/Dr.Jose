<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Dr. José — Assistente Jurídico Português</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #0b3d2e;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #d4af37;
        }

        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #d9f0ff;
            align-self: flex-end;
        }

        .bot {
            background: #ffffff;
            border-left: 4px solid #0b3d2e;
        }

        /* Input area */
        .input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ccc;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #aaa;
            border-radius: 6px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #0b3d2e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #0d4f3a;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h1>⚖️ Dr. José</h1>
        <p>Assistente Jurídico Português</p>

        <div id="status" class="status">A verificar API…</div>
    </div>

    <!-- Main -->
    <div class="main">
        <div id="chat" class="chat-window"></div>

        <div class="input-area">
            <input id="pergunta" type="text" placeholder="Escreve a tua pergunta jurídica…">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

<script>
const API_URL = "http://localhost:8000";  // Ajusta se mudares o backend

// Verificar estado da API
async function checkAPI() {
    try {
        const r = await fetch(`${API_URL}/health`);
        if (r.ok) {
            document.getElementById("status").innerHTML = "🟢 API operacional";
        } else {
            document.getElementById("status").innerHTML = "🟠 API respondeu com erro";
        }
    } catch (e) {
        document.getElementById("status").innerHTML = "🔴 API offline";
    }
}
checkAPI();
setInterval(checkAPI, 5000);


// Adicionar mensagem ao chat
function addMessage(text, sender) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `message ${sender}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}


// Enviar pergunta
async function enviar() {
    const pergunta = document.getElementById("pergunta").value.trim();
    if (!pergunta) return;

    addMessage(pergunta, "user");
    document.getElementById("pergunta").value = "";

    try {
        const resposta = await fetch(`${API_URL}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pergunta })
        });

        if (!resposta.ok) {
            addMessage("⚠️ Erro ao contactar o servidor.", "bot");
            return;
        }

        const data = await resposta.json();

        addMessage(
            data.resposta +
            "<br><br><i>Esta resposta é informativa e não substitui consulta jurídica profissional.</i>",
            "bot"
        );

    } catch (e) {
        addMessage("❌ Não foi possível comunicar com o servidor.", "bot");
    }
}
</script>

</body>
</html>
